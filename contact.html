<form action="https://formspree.io/f/xbdzdgep" method="POST">
  <input type="hidden" name="_subject" value="【金財天】お問い合わせ">
  <input type="hidden" name="_next" value="https://chabozu-web.github.io/kinzaiten-preview/thanks.html">

  <div style="margin-top:10px">
    <label for="name">お名前</label>
    <input id="name" name="name" type="text" autocomplete="name" required />
  </div>

  <div style="margin-top:10px">
    <label for="tel">電話番号（任意）</label>
    <input id="tel" name="tel" type="tel" autocomplete="tel" inputmode="tel" placeholder="例）0312345678" />
  </div>

  <div style="margin-top:10px">
    <label for="email">メールアドレス</label>
    <input id="email" name="email" type="email" autocomplete="email" required />
  </div>

  <div style="margin-top:10px">
    <label for="item">品目（任意）</label>
    <input id="item" name="item" type="text" placeholder="例）時計 / ブランドバッグ / 貴金属 など" />
  </div>

  <div style="margin-top:10px">
    <label for="msg">内容</label>
    <textarea id="msg" name="message" required placeholder="例）時計の査定希望。来店できるのは土曜午後です。"></textarea>
  </div>

  <div class="pill" style="margin-top:12px">
    <strong>個人情報の取扱い</strong>
    <div class="muted" style="font-size:13px;margin-top:6px;">
      送信いただいた情報はお問い合わせ対応のために利用します。
      <a href="./privacy.html">プライバシーポリシー</a>をご確認ください。
    </div>

    <label for="agree" style="
      margin-top:10px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:12px;
      cursor:pointer;
      user-select:none;
    ">
      <input id="agree" name="agree" type="checkbox" required style="
        width:18px;
        height:18px;
        margin:0;
        flex:0 0 auto;
      ">
      <span style="font-weight:600;">同意します <span style="color:var(--muted);">（必須）</span></span>
    </label>
  </div>

  <div style="margin-top:12px">
    <button class="btn primary" type="submit">送信する</button>
  </div>

  <p class="muted" style="margin:10px 0 0;font-size:12px;">
    ※現在は確認用の仮フォームです。送信内容はテストとして扱われます。
  </p>
</form>
